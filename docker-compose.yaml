services:
  axon-server:
    image: docker.axoniq.io/axoniq/axonserver:2026.0.0
    container_name: simple-axon-server
    ports:
      - "8024:8024"
      - "8124:8124"
    environment:
      axoniq.axonserver.standalone: true
      axoniq.axonserver.standalone-dcb: false
      axoniq_axonserver_hostname: axon-server
      axoniq_axonserver_devmode_enabled: true
    volumes:
      - data:/axonserver/data
      - events:/axonserver/events

volumes:
  db:
    driver: local
  data:
    driver: local
  events:
    driver: local
